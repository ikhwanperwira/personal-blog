{{ define "main" }}
  <article class="post">
    <header class="post-header">
      <p><a href="{{ "/" | relURL }}">Back to home</a></p>
      <h1>{{ .Title }}</h1>
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
    </header>
    <div class="post-body">
      {{ .Content }}
    </div>
  </article>
{{ end }}
